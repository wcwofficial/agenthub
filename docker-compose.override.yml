# Development override
# Run: docker compose -f docker-compose.yml -f docker-compose.override.yml up
# Or: docker compose up (Compose merges override automatically)

services:
  postgres:
    ports:
      - "5433:5432"  # Dev DB on 5433 (avoid clash with local/prod Postgres on 5432)
    environment:
      POSTGRES_DB: agenthub-dev  # Must match Database=... in API connection string
      POSTGRES_USER: agenthub
      POSTGRES_PASSWORD: dev123
    volumes:
      - postgres-dev-data:/var/lib/postgresql/data

  agenthub-api:
    ports:
      - "5000:8080"  # Dev API on localhost:5000
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__AgentHub: "Host=postgres;Port=5432;Database=agenthub-dev;Username=agenthub;Password=dev123"

volumes:
  postgres-dev-data:
