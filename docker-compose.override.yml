# Development override
# Использовать: docker-compose -f docker-compose.yml -f docker-compose.override.yml up
# Или просто: docker-compose up (автоматически подхватит override)

services:
  postgres:
    ports:
      - "5433:5432"  # Dev БД на порту 5433 (чтобы не конфликтовать с локальным/prod Postgres на 5432)
    environment:
      POSTGRES_DB: agenthub-dev  # Должно совпадать с Database=... в строке подключения API
      POSTGRES_USER: agenthub
      POSTGRES_PASSWORD: dev123
    volumes:
      - postgres-dev-data:/var/lib/postgresql/data

  agenthub-api:
    ports:
      - "5000:8080"  # Dev API на localhost:5000
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__AgentHub: "Host=postgres;Port=5432;Database=agenthub-dev;Username=agenthub;Password=dev123"

volumes:
  postgres-dev-data:
