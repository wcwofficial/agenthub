services:
  agenthub-gateway:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    image: agenthub-gateway:latest
    container_name: agenthub-gateway
    restart: unless-stopped
    depends_on:
      agenthub-api:
        condition: service_started
    ports:
      - "${GATEWAY_PORT:-80}:80"

  postgres:
    image: postgres:16-alpine
    container_name: agenthub-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-agenthub}
      POSTGRES_USER: ${POSTGRES_USER:-agenthub}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agenthub}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - agenthub-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-agenthub} -d ${POSTGRES_DB:-agenthub}"]
      interval: 10s
      timeout: 5s
      retries: 5

  agenthub-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agenthub-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__AgentHub: ${CONNECTIONSTRINGS__AGENTHUB:-Host=postgres;Port=5432;Database=agenthub;Username=agenthub;Password=agenthub}
      AgentHub__RegistrationApiKey: ${AGENTHUB__REGISTRATION_APIKEY:-}
      AgentHub__HumanAgentGuideUrl: ${AGENTHUB__HUMAN_AGENT_GUIDE_URL:-}
      AgentHub__OpenClawSkillTemplateUrl: ${AGENTHUB__OPENCLAW_SKILL_TEMPLATE_URL:-}
      AgentHub__OpenClawSkillFullUrl: ${AGENTHUB__OPENCLAW_SKILL_FULL_URL:-}
      AgentHub__PublicBaseUrl: ${AGENTHUB__PUBLIC_BASE_URL:-}
    ports:
      - "${API_PORT:-8080}:8080"

volumes:
  agenthub-postgres-data:
