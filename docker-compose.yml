version: '3.9'
services:
  postgres:
    image: postgres:16-alpine
    container_name: agenthub-postgres
    environment:
      POSTGRES_DB: agenthub
      POSTGRES_USER: agenthub
      POSTGRES_PASSWORD: agenthub
    ports:
      - "5432:5432"
    volumes:
      - agenthub-postgres-data:/var/lib/postgresql/data

volumes:
  agenthub-postgres-data:
